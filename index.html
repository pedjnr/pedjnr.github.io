<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />
    <meta name="theme-color" content="#f5f7f4" />
    <script>
      (function () {
        try {
          var savedTheme = window.localStorage.getItem('qa-portfolio-theme-v2');
          var systemTheme =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          var theme = savedTheme === 'dark' || savedTheme === 'light' ? savedTheme : systemTheme;
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme === 'dark' ? 'dark' : 'only light';

          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) {
            themeColor.setAttribute('content', theme === 'dark' ? '#111716' : '#f5f7f4');
          }
        } catch (error) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <meta name="description" content="Portfólio profissional de QA de Pedro Carvalho, com projetos de testes manuais, automação, APIs e performance." />
    <title>Pedro Carvalho | Portfólio QA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
